site_name: "Exploring Python"
site_url: https://python.bradpenney.io
site_description: Python automation for platform engineers and SREs — from first script to production-grade automation tools.
site_author: Brad Penney

extra:
  analytics:
    provider: google
    property: G-V01MJ4R3SQ
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bradpenney
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/bradpenney

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: amber
  logo: images/exploring_python.png
  favicon: images/exploring_python.png
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.code.highlight
    - content.tooltips
    - content.code.mermaid

plugins:
  - search
  - meta

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md

  - 🐍 Day One:
      - Overview: day_one/overview.md
      - Why Python (Not Just Bash): day_one/why_python.md
      - "Is It Still Up?": day_one/health_check.md
      - "What Just Broke?": day_one/parsing_logs.md
      - "Did the Config Change?": day_one/comparing_configs.md
      - "Run This Everywhere": day_one/run_everywhere.md
      - My Bash Script Is Getting Out of Hand: day_one/wrapping_bash.md
      - The "Don't Do This" Guide: day_one/safety_guide.md

  # 📦 Essentials — Core Python for working platform engineers
  - 📦 Essentials:
      - Environment Variables and Secrets: essentials/env_and_secrets.md
      - Working with YAML: essentials/yaml.md
  #     - Strings for Platform Engineers: essentials/strings.md
  #     - Lists and Loops: essentials/lists_and_loops.md
  #     - Dictionaries and JSON: essentials/dicts_and_json.md
  #     - Functions: essentials/functions.md
  #     - File I/O in Depth: essentials/file_io.md
  #     - Error Handling: essentials/error_handling.md

  # ⚡ Efficiency — Professional Python patterns
  # - ⚡ Efficiency:
  #     - subprocess in Depth: efficiency/subprocess.md
  #     - requests: Calling APIs: efficiency/requests.md
  #     - click: Building CLI Tools: efficiency/click.md
  #     - Logging: efficiency/logging.md
  #     - Regular Expressions for Log Parsing: efficiency/regex.md
  #     - Testing Automation with pytest: efficiency/pytest.md
  #     - Dataclasses and Type Hints: efficiency/dataclasses.md

  # 🎯 Mastery — Production Python for senior engineers
  # - 🎯 Mastery:
  #     - Packaging Python Tools with Poetry: mastery/packaging.md
  #     - Building Internal APIs with FastAPI: mastery/fastapi.md
  #     - Async Python for Platform Engineering: mastery/async.md
